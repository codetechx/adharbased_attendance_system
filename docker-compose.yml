services:
  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ams_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - laravel_public:/var/www/html/public:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - ams_network
    restart: unless-stopped

  # ─── PHP-FPM (Laravel Backend) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ams_backend
    volumes:
      - ./backend/storage:/var/www/html/storage
      - laravel_public:/var/www/html/public
    environment:
      - APP_NAME=${APP_NAME:-AMS}
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Kolkata}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-attendance_db}
      - DB_USERNAME=${DB_USERNAME:-ams_user}
      - DB_PASSWORD=${DB_PASSWORD:-ams_secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secret}
      - REDIS_CLIENT=predis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - CACHE_STORE=redis
      - CACHE_PREFIX=ams_
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - PDF_SERVICE_URL=${PDF_SERVICE_URL:-http://pdf-service:8001}
      - PDF_SERVICE_TIMEOUT=${PDF_SERVICE_TIMEOUT:-60}
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:5173,127.0.0.1}
      - FILESYSTEM_DISK=local
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ams_network
    restart: unless-stopped

  # ─── React Frontend (Vite Dev / Nginx Prod) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_TARGET:-dev}
    container_name: ams_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost/api}
      - VITE_BIOMETRIC_WS=ws://localhost:12345
    networks:
      - ams_network
    restart: unless-stopped

  # ─── MySQL 8 ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ams_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-attendance_db}
      MYSQL_USER: ${DB_USERNAME:-ams_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ams_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ams_network
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ams_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ams_network
    restart: unless-stopped

  # ─── Python PDF / Aadhaar Processing Service ────────────────────────────────
  pdf-service:
    build:
      context: ./pdf-service
      dockerfile: Dockerfile
    container_name: ams_pdf_service
    ports:
      - "8001:8001"
    volumes:
      - ./pdf-service:/app
      - ./backend/storage/app/aadhaar:/app/aadhaar_uploads
    environment:
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173
    networks:
      - ams_network
    restart: unless-stopped

  # ─── Queue Worker ─────────────────────────────────────────────────────────────
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ams_queue
    entrypoint: ["/queue-entrypoint.sh"]
    volumes:
      - ./backend/storage:/var/www/html/storage
    environment:
      - APP_NAME=${APP_NAME:-AMS}
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Kolkata}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-attendance_db}
      - DB_USERNAME=${DB_USERNAME:-ams_user}
      - DB_PASSWORD=${DB_PASSWORD:-ams_secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secret}
      - REDIS_CLIENT=predis
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - CACHE_PREFIX=ams_
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - FILESYSTEM_DISK=local
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ams_network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  laravel_public:
    driver: local

networks:
  ams_network:
    driver: bridge
